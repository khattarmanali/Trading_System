services:
  api:
    build: .
    container_name: trading-system-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    container_name: trading-system-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: trading_system
      MYSQL_USER: trader
      MYSQL_PASSWORD: trader
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: trading-system-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
